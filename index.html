<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EspaFacil - Apprendre l'espagnol</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>

  <!-- ECRAN 1 : ACCUEIL -->
  <div id="screen-home" class="screen active">
    <div class="home-container">
      <div class="top-bar">
        <button class="btn-stats" id="btn-open-stats">Stats</button>
        <button class="btn-theme-toggle" id="btn-theme" title="Thème sombre">🌙</button>
      </div>
      <div class="logo">
        <span class="logo-icon">ES</span>
        <h1>EspaFacil</h1>
        <p class="tagline">Apprenez l'espagnol, carte par carte</p>
      </div>
      <div class="mode-toggle">
        <span class="mode-label">Mode</span>
        <button class="mode-btn active" id="mode-flip" onclick="setMode('flip')">Retournement</button>
        <button class="mode-btn" id="mode-write" onclick="setMode('write')">Ecriture</button>
      </div>
      <div class="progress-summary" id="progress-summary"></div>
      <h2 class="section-title">Choisissez un theme</h2>
      <div class="theme-grid" id="theme-grid"></div>
    </div>
  </div>

  <!-- ECRAN 2 : NIVEAU -->
  <div id="screen-level" class="screen">
    <div class="level-container">
      <button class="btn-back" id="back-to-home">← Retour</button>
      <div class="level-header">
        <span class="level-theme-icon" id="level-theme-icon"></span>
        <h2 id="level-theme-name"></h2>
      </div>
      <p class="level-subtitle">Choisissez votre niveau</p>
      <div class="level-cards" id="level-cards"></div>
    </div>
  </div>

  <!-- ECRAN 3 : SESSION QCM -->
  <div id="screen-session" class="screen">
    <div class="session-container">
      <div class="session-header">
        <button class="btn-back" id="back-to-level">← Quitter</button>
        <div class="session-info">
          <span id="session-theme-label"></span>
          <span class="session-level-badge" id="session-level-badge"></span>
        </div>
        <div class="session-score">
          <span class="score-good" id="score-good">✓ 0</span>
          <span class="score-bad" id="score-bad">✗ 0</span>
        </div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <p class="card-counter" id="card-counter">Carte 1 / 10</p>
      <div class="qcm-card">
        <p class="qcm-label">Comment dit-on en francais ?</p>
        <p class="qcm-word" id="qcm-word"></p>
        <p class="qcm-example" id="qcm-example"></p>
      </div>
      <div class="qcm-choices" id="qcm-choices"></div>
    </div>
  </div>

  <!-- ECRAN 3B : SESSION ECRITURE -->
  <div id="screen-write" class="screen">
    <div class="session-container">
      <div class="session-header">
        <button class="btn-back" id="back-to-level-write">← Quitter</button>
        <div class="session-info">
          <span id="write-theme-label"></span>
          <span class="session-level-badge" id="write-level-badge"></span>
        </div>
        <div class="session-score">
          <span class="score-good" id="write-score-good">✓ 0</span>
          <span class="score-bad" id="write-score-bad">✗ 0</span>
        </div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="write-progress-bar"></div></div>
      <p class="card-counter" id="write-card-counter">Carte 1 / 10</p>
      <div class="write-card">
        <p class="card-lang">ES Espagnol</p>
        <p class="write-word" id="write-word"></p>
        <div class="write-input-wrap">
          <input type="text" id="write-input" class="write-input" placeholder="Tapez la traduction en francais..." autocomplete="off" />
          <button class="btn-validate" id="btn-validate">Valider</button>
        </div>
        <div class="write-feedback" id="write-feedback"></div>
        <button class="btn-next-write" id="btn-next-write" style="display:none">Suivant →</button>
      </div>
    </div>
  </div>

  <!-- ECRAN 4 : RESULTATS -->
  <div id="screen-results" class="screen">
    <div class="results-container">
      <div class="results-emoji" id="results-emoji"></div>
      <h2 class="results-title" id="results-title"></h2>
      <p class="results-subtitle" id="results-subtitle"></p>
      <div class="results-stats">
        <div class="stat-box stat-good"><span class="stat-number" id="result-good">0</span><span class="stat-label">Connues</span></div>
        <div class="stat-box stat-bad"><span class="stat-number" id="result-bad">0</span><span class="stat-label">A revoir</span></div>
        <div class="stat-box stat-score"><span class="stat-number" id="result-score">0%</span><span class="stat-label">Score</span></div>
      </div>
      <div class="results-actions">
        <button class="btn-primary" id="btn-retry">Recommencer</button>
        <button class="btn-review" id="btn-review" style="display:none">Revoir les ratees</button>
        <button class="btn-secondary" id="btn-home">Accueil</button>
      </div>
    </div>
  </div>

  <!-- ECRAN 5 : STATISTIQUES -->
  <div id="screen-stats" class="screen">
    <div class="stats-container">
      <button class="btn-back" id="back-from-stats">← Retour</button>
      <h2 class="stats-title">Mes statistiques</h2>
      <div class="stats-global" id="stats-global"></div>
      <h3 class="stats-section-title">Par theme</h3>
      <div class="stats-themes" id="stats-themes"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
